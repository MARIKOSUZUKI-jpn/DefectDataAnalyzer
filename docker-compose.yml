services:
  local-db:
    image: postgres:16-alpine
    container_name: local-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
  app:
      build:
        context: ./src/DefectApp
        dockerfile: Dockerfile
      container_name: defect-app
      ports:
        - "5000:8080" # ブラウザで http://localhost:5000 でアクセス可能に
      depends_on:
        - local-db    # DBが起動してからアプリを起動させる
      environment:
        # C#側からDBに接続するための設定（Host名はサービス名の local-db を指定）
        - ConnectionStrings__DefaultConnection=Host=local-db;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      